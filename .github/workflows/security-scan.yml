name: Security Scan

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Sync Upstream"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  statuses: write
  checks: write
  issues: write
  security-events: write

concurrency:
  group: security-scan
  cancel-in-progress: false

jobs:
  scan:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    uses: tyler-technologies-oss/external-action-shared-workflows/.github/workflows/security-scan.yml@feat/ai-supply-chain-review
    with:
      default_branch: main
    secrets: inherit
